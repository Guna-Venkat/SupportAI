# SupportAI - Default Configuration Parameters
# -------------------------------------------------------------
# Baseline settings for all runs. Overridden by train.yaml
# and inference.yaml when active.

project:
  name: "SupportAI"
  description: "Lightweight calibrated customer support ticketing system"
  version: "0.1.0"

# Reproducibility
seed: 42
full_determinism: false

# Global paths (relative to repo root)
paths:
  data_dir: "data"
  outputs_dir: "outputs"
  logs_dir: "logs"
  models_dir: "outputs/models"
  metrics_dir: "outputs/metrics"
  figures_dir: "outputs/figures"
  checkpoints_dir: "outputs/checkpoints"

# Central Logging Configuration
logging:
  level: "INFO"
  log_to_file: true
  log_filename: "supportai.log"
  use_rich: true

# Baseline Data Configuration
data:
  dataset_name: "customer_support_tickets_v1"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# Default Model Parameters
model:
  name: "tfidf_classifier"
  type: "sklearn"
  params:
    max_features: 5000
    ngram_range: [1, 2]

# Decision Engine Routing and LLM Configuration
decision_engine:
  high_confidence_threshold: 0.90
  low_confidence_threshold: 0.60

# Toggles for Stage 1 (Classifier only), Stage 2 (Classifier + Retrieval), and Stage 3 (RAG)
retrieval:
  enabled: true

llm:
  enabled: true
  provider: "huggingface" # options: "huggingface", "ollama", "gguf"
  model_id: "microsoft/Phi-3-mini-4k-instruct"
  max_new_tokens: 128
  temperature: 0.2
  ollama_url: "http://localhost:11434"
  ollama_model: "qwen2.5:0.5b"
  gguf_path: ""



