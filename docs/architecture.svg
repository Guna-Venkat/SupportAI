<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="100%" height="100%">
  <!-- Definitions for gradients and markers -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b" />
      <stop offset="100%" stop-color="#022c22" />
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 6 5 L 0 8.5 z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="900" height="480" rx="12" fill="#0b0f19" stroke="#1e293b" stroke-width="2"/>

  <!-- GRID lines for alignment (subtle) -->
  <path d="M 0 120 L 900 120 M 0 240 L 900 240 M 0 360 L 900 360" stroke="#1e293b" stroke-opacity="0.2" stroke-width="1" />

  <!-- SECTION 1: USER / CLIENT -->
  <g transform="translate(40, 180)">
    <rect width="120" height="120" rx="8" fill="url(#blueGrad)" stroke="#334155" stroke-width="1.5" />
    <text x="60" y="35" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Client App /</text>
    <text x="60" y="55" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Web Console</text>
    <rect x="15" y="75" width="90" height="24" rx="4" fill="#020617" stroke="#334155" />
    <text x="60" y="91" fill="#38bdf8" font-family="monospace" font-size="11" text-anchor="middle">POST /predict</text>
  </g>

  <!-- Connection: Client -> FastAPI -->
  <line x1="160" y1="240" x2="210" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- SECTION 2: FASTAPI APPS GATEWAY & OBSERVABILITY -->
  <g transform="translate(210, 100)">
    <rect width="180" height="280" rx="8" fill="url(#emeraldGrad)" stroke="#059669" stroke-width="1.5" />
    <text x="90" y="35" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">FastAPI Gateway</text>
    
    <!-- Middleware subbox -->
    <g transform="translate(15, 60)">
      <rect width="150" height="70" rx="6" fill="#022c22" stroke="#047857" stroke-dasharray="3,3" />
      <text x="75" y="25" fill="#a7f3d0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Observability Intercept</text>
      <text x="75" y="45" fill="#6ee7b7" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">UUID Generat. / Tracing</text>
    </g>

    <!-- Exporters -->
    <g transform="translate(15, 150)">
      <rect width="150" height="50" rx="6" fill="#064e3b" stroke="#059669" />
      <text x="75" y="22" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">JSONL Traces Log</text>
      <text x="75" y="38" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">logs/traces.jsonl</text>
    </g>

    <g transform="translate(15, 215)">
      <rect width="150" height="50" rx="6" fill="#064e3b" stroke="#059669" />
      <text x="75" y="22" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Prometheus Exporter</text>
      <text x="75" y="38" fill="#34d399" font-family="monospace" font-size="10" text-anchor="middle">GET /metrics</text>
    </g>
  </g>

  <!-- Connection: FastAPI -> Decision Engine -->
  <line x1="390" y1="240" x2="440" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- SECTION 3: DECISION ENGINE -->
  <g transform="translate(440, 150)">
    <rect width="150" height="180" rx="8" fill="url(#skyGrad)" stroke="#0284c7" stroke-width="1.5" />
    <text x="75" y="30" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Decision Engine</text>
    <text x="75" y="50" fill="#bae6fd" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Confidence Router</text>

    <!-- Condition box -->
    <rect x="15" y="75" width="120" height="85" rx="6" fill="#0c4a6e" stroke="#38bdf8" />
    <text x="60" y="98" fill="#f1f5f9" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Confidence &gt;= 0.8</text>
    <line x1="15" y1="110" x2="135" y2="110" stroke="#0284c7" />
    <text x="60" y="128" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">YES: Direct Route</text>
    <text x="60" y="145" fill="#f87171" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">NO: LLM Fallback</text>
  </g>

  <!-- Connection: Decision Engine -> High Conf (Top path) -->
  <path d="M 590 220 Q 640 160 670 160" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)" />
  <text x="635" y="150" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">High Conf</text>

  <!-- Connection: Decision Engine -> Low Conf (Bottom path) -->
  <path d="M 590 260 Q 640 320 670 320" fill="none" stroke="#f87171" stroke-width="2" marker-end="url(#arrow)" />
  <text x="635" y="325" fill="#f87171" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Low Conf</text>

  <!-- SECTION 4: HIGH CONFIDENCE PATH (CLASSIFIER) -->
  <g transform="translate(670, 90)">
    <rect width="180" height="120" rx="8" fill="url(#indigoGrad)" stroke="#4f46e5" stroke-width="1.5" />
    <text x="90" y="28" fill="#c7d2fe" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Classifier Pipeline</text>
    <text x="90" y="45" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">ONNX INT8 Quantized</text>

    <!-- Calibration badge -->
    <rect x="15" y="65" width="150" height="40" rx="4" fill="#1e1b4b" stroke="#6366f1" />
    <text x="90" y="80" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Temperature Scaled</text>
    <text x="90" y="95" fill="#a5b4fc" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Calibrated Probabilities</text>
  </g>

  <!-- SECTION 5: LOW CONFIDENCE PATH (RETRIEVAL + LLM) -->
  <g transform="translate(670, 250)">
    <rect width="180" height="150" rx="8" fill="url(#indigoGrad)" stroke="#4f46e5" stroke-width="1.5" />
    <text x="90" y="25" fill="#c7d2fe" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">FAISS Retrieval &amp; LLM</text>
    
    <!-- Retriever -->
    <rect x="15" y="45" width="150" height="40" rx="4" fill="#1e1b4b" stroke="#4f46e5" />
    <text x="90" y="60" fill="#a5b4fc" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Semantic Retriever</text>
    <text x="90" y="73" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">Similar Resolved Tickets</text>

    <!-- LLM Fallback -->
    <rect x="15" y="95" width="150" height="42" rx="4" fill="#1e1b4b" stroke="#4f46e5" />
    <text x="90" y="111" fill="#e0e7ff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">LLM Fallback</text>
    <text x="90" y="125" fill="#f43f5e" font-family="monospace" font-size="9" text-anchor="middle">microsoft/Phi-3-mini</text>
  </g>

  <!-- Return Flow Arrows -->
  <path d="M 850 150 L 870 150 L 870 440 L 100 440 L 100 300" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow)" />
  <path d="M 850 325 L 870 325" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" />

  <text x="480" y="432" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Inference Output Response Flow</text>

</svg>
